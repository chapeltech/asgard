services:
  kdc1:
    image: asgard/kdc
    hostname: kdc1.example.com
    command: start-kdc

  kdc2:
    image: asgard/kdc
    hostname: kdc2.example.com
    command: start-kdc
  #
  # This is the host on which the administrator
  # will be running commands:
  bastion:
    image: asgard/client
    hostname: bastion.example.com
    command: start-client

  #
  # This host will run a web server that accepts
  # krb5 connections...
  httpserver:
    image: asgard/client
    hostname: httpserver.example.com
    command: start-client

  #
  # This host will run a web server that accepts
  # krb5 connections...
  sshserver:
    image: asgard/client
    hostname: sshserver.example.com
    command: start-client

  #
  # These hosts are otherwise identical clients.  The test harness
  # provisions one with krb5_admin/krb5_keytab and the other with bifrost,
  # then compares the resulting host state.
  client-krb5:
    image: asgard/client
    hostname: client-krb5.example.com
    command: start-client

  client-bifrost:
    image: asgard/client
    hostname: client-bifrost.example.com
    command: start-client
